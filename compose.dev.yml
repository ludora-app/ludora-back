# Development environment configuration
# Usage: docker compose -f compose.dev.yml up --build

services:
  ludora-api:
    build:
      context: .
      dockerfile: docker/nest-api/Dockerfile.dev
    container_name: ludora-api
    restart: "no" # Don't restart in dev for easier debugging
    ports:
      - "2424:2424" # API port
      - "51212:51212" # Prisma Studio port
      - "9229:9229" # Node.js debugging port
    volumes:
      - ./src:/usr/src/app/src
      - ./prisma:/usr/src/app/prisma
      - ./tests:/usr/src/app/tests
      - ./generated:/usr/src/app/generated
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      # Vault AppRole configuration
      - VAULT_ADDR=${VAULT_ADDR:-https://vault.ludora.fr}
      - VAULT_ROLE_ID
      - VAULT_SECRET_ID
    command: ["sh", "scripts/start-dev.sh"]
    networks:
      - ludora-network
    depends_on:
      - ludora-db
    # Add healthcheck to ensure API is ready
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2424/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Add development-specific labels
    labels:
      - "dev.environment=development"
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.services.ludora-api.loadbalancer.server.port=2424"
      # Add basic auth middleware for Swagger
      - "traefik.http.middlewares.swagger-basicauth.basicauth.users=${BASIC_AUTH_USERNAME}:${BASIC_AUTH_PASSWORD_HASH}"
      # Router for Swagger with basic auth (higher priority)
      - "traefik.http.routers.ludora-api-swagger.rule=Host(`ludora-api-dev.gana-f4ll.fr`) && PathPrefix(`/swagger`)"
      - "traefik.http.routers.ludora-api-swagger.entrypoints=websecure"
      - "traefik.http.routers.ludora-api-swagger.tls=true"
      - "traefik.http.routers.ludora-api-swagger.tls.certresolver=myresolver"
      - "traefik.http.routers.ludora-api-swagger.middlewares=swagger-basicauth"
      - "traefik.http.routers.ludora-api-swagger.service=ludora-api"
      - "traefik.http.routers.ludora-api-swagger.priority=10"
      # Main router for API (lower priority)
      - "traefik.http.routers.ludora-api.rule=Host(`ludora-api-dev.gana-f4ll.fr`)"
      - "traefik.http.routers.ludora-api.entrypoints=websecure"
      - "traefik.http.routers.ludora-api.tls=true"
      - "traefik.http.routers.ludora-api.tls.certresolver=myresolver"
      - "traefik.http.routers.ludora-api.service=ludora-api"
      - "traefik.http.routers.ludora-api.priority=1"

  ludora-db:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    restart: "no"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_LOG_STATEMENT=all
      # Vault AppRole configuration
      - VAULT_ADDR=${VAULT_ADDR:-https://vault.ludora.fr}
      - VAULT_ROLE_ID
      - VAULT_SECRET_ID
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/vault/envconsul-docker.hcl:/etc/envconsul/config.hcl:ro
    networks:
      - ludora-network
    labels:
      - "traefik.enable=false"
  # Include Grafana in development for monitoring
 

  ludora-k6:
    image: grafana/k6:latest
    container_name: ludora-k6
    restart: "no"
    volumes:
      - ./load-tests:/scripts
    networks:
      - ludora-network
    profiles:
      - tools

volumes:
  postgres-data:


networks:
  ludora-network:
    driver: bridge

