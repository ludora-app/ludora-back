# Local environment configuration
# Usage: docker compose -f docker/compose.local.yml up --build

services:
  ludora-api:
    build:
      context: ..
      dockerfile: docker/nest-api/Dockerfile.local
    container_name: ludora-api
    restart: 'no' # Don't restart in local for easier debugging
    ports:
      - '2424:2424' # API port
      - '51212:51212' # Prisma Studio port
      - '9229:9229' # Node.js debugging port
    volumes:
      - ../src:/usr/src/app/src
      - ../prisma:/usr/src/app/prisma
      - ../tests:/usr/src/app/tests
      - ../generated:/usr/src/app/generated
      - /usr/src/app/node_modules
    environment:
      - "NODE_ENV=debug"
      # Vault AppRole configuration
      - "VAULT_ADDR=${VAULT_ADDR:-https://vault.ludora.fr}"
      - VAULT_ROLE_ID
      - VAULT_SECRET_ID
    command: ['sh', 'scripts/start-local.sh']
    networks:
      - ludora-network
    depends_on:
      - ludora-db
    # Add healthcheck to ensure API is ready
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:2424/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Add local-specific labels
    labels:
      - 'dev.environment=local'

  ludora-db:
    build:
      context: ..
      dockerfile: docker/postgres/Dockerfile
    restart: 'no'
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_LOG_STATEMENT=all
      # Vault AppRole configuration
      - VAULT_ADDR=${VAULT_ADDR:-https://vault.ludora.fr}
      - VAULT_ROLE_ID
      - VAULT_SECRET_ID
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../scripts/vault/envconsul-docker-local.hcl:/etc/envconsul/config.hcl:ro
    networks:
      - ludora-network

  ludora-k6:
    image: grafana/k6:latest
    container_name: ludora-k6-local
    restart: 'no'
    volumes:
      - ../load-tests:/scripts
    networks:
      - ludora-network
    profiles:
      - tools

volumes:
  postgres-data:

networks:
  ludora-network:
    driver: bridge
