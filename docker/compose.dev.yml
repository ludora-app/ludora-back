# Development environment configuration (production replica with dev Vault)
# Usage: docker compose --project-directory . -f docker/compose.dev.yml up --build

services:
  ludora-api:
    build:
      context: .
      dockerfile: docker/nest-api/Dockerfile.prod
      args:
        ENV_NAME: dev
    container_name: ludora-api-dev
    restart: unless-stopped
    ports:
      - '2424:2424'
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    networks:
      - ludora-network
      - traefik
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:2424/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Production security
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    command: ['sh', 'scripts/start-prod.sh']

networks:
  ludora-network:
    driver: bridge
  traefik:
    external: true
