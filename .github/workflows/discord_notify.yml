name: Discord Sync Notification

on:
  push:
    branches:
      - main
      - dev
      - staging
  pull_request:
    branches:
      - main
      - dev
      - staging
    paths-ignore:
      - 'CHANGELOG.md'
      - 'CHANGELOG/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Message
        # On passe les deux secrets en variables d'environnement
        env:
          WEBHOOK_PROD: ${{ secrets.DISCORD_WEBHOOK_PROD }}
          WEBHOOK_DEV: ${{ secrets.DISCORD_WEBHOOK_DEV }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Sur un pull_request, on cible la branche de destination
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.base_ref }}"
            SOURCE_BRANCH="${{ github.head_ref }}"
            RAW_MSG="${{ github.event.pull_request.title }}"
            EVENT_LABEL="🔀 Pull Request"
          else
            BRANCH="${{ github.ref_name }}"
            SOURCE_BRANCH=""
            RAW_MSG="${{ github.event.head_commit.message }}"
            EVENT_LABEL="🚀 Push"
          fi
          AUTHOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          MSG=$(echo "$RAW_MSG" | head -n 1 | tr -d '"' | tr -d "'")

          # --- EXCLUSION DES COMMITS CHANGELOG ---
          if echo "$MSG" | grep -qiE "^(chore|docs|release)(\(.+\))?!?:.*changelog|^update changelog|^bump changelog"; then
            echo "⏭️ Commit changelog ignoré : $MSG"
            exit 0
          fi
          # ----------------------------------------

          # --- LOGIQUE DE SÉLECTION DU CANAL ---
          if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "staging" ]; then
            SELECTED_WEBHOOK=$WEBHOOK_PROD
            COLOR=15158332 # Rouge/Orange pour la Prod/Staging
          else
            SELECTED_WEBHOOK=$WEBHOOK_DEV
            COLOR=3447003 # Bleu pour Develop
          fi
          # -------------------------------------

          PR_TITLE=""
          PR_BRANCH=""
          if [ "${{ github.event_name }}" = "push" ]; then
            PR_DATA=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls)
            PR_TITLE=$(echo "$PR_DATA" | jq -r '.[0].title // empty')
            PR_BRANCH=$(echo "$PR_DATA" | jq -r '.[0].head.ref // empty')
          fi

          TICKET_RAW=$(echo "$BRANCH $SOURCE_BRANCH $RAW_MSG $PR_TITLE $PR_BRANCH" | grep -ioE "SCRUM[- ][0-9]+" | head -1 || echo "")
          if [ -n "$TICKET_RAW" ]; then
            TICKET=$(echo "$TICKET_RAW" | tr 'a-z' 'A-Z' | tr ' ' '-')
            JIRA_LINK="🔗 **Jira :** [$TICKET](https://hichemamir398-1740388314640.atlassian.net/browse/$TICKET)"
          else
            JIRA_LINK="🔗 **Jira :** Aucun ticket détecté"
          fi

          # On utilise $SELECTED_WEBHOOK à la fin de la commande curl
          curl -X POST -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"$EVENT_LABEL sur $BRANCH\",
              \"description\": \"💡 **Message :**\n> $MSG\n\n $JIRA_LINK\",
              \"color\": $COLOR,
              \"fields\": [
                { \"name\": \"🌿 Repo\", \"value\": \"\`$REPO\`\", \"inline\": true },
                { \"name\": \"👤 Auteur\", \"value\": \"**$AUTHOR**\", \"inline\": true }
              ],
              \"footer\": { \"text\": \"Ludora App Backend\" },
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" $SELECTED_WEBHOOK
