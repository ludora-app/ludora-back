name: Discord Sync Notification

on:
  push:
    branches:
      - main
      - dev
      - staging

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Message
        # On passe les deux secrets en variables d'environnement
        env:
          WEBHOOK_PROD: ${{ secrets.DISCORD_WEBHOOK_PROD }}
          WEBHOOK_DEV: ${{ secrets.DISCORD_WEBHOOK_DEV }}
        run: |
          BRANCH="${{ github.ref_name }}"
          AUTHOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          MSG=$(echo "${{ github.event.head_commit.message }}" | head -n 1 | tr -d '"' | tr -d "'")

          # --- LOGIQUE DE SÉLECTION DU CANAL ---
          if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "staging" ]; then
            SELECTED_WEBHOOK=$WEBHOOK_PROD
            COLOR=15158332 # Rouge/Orange pour la Prod/Staging
          else
            SELECTED_WEBHOOK=$WEBHOOK_DEV
            COLOR=3447003 # Bleu pour Develop
          fi
          # -------------------------------------

          TICKET=$(echo "$BRANCH $MSG" | grep -oE "SCRUM-[0-9]+" | head -1 || echo "")
          if [ -n "$TICKET" ]; then
            JIRA_LINK="🔗 **Jira :** [$TICKET](https://hichemamir398-1740388314640.atlassian.net/browse/$TICKET)"
          else
            JIRA_LINK="🔗 **Jira :** Aucun ticket détecté"
          fi

          # On utilise $SELECTED_WEBHOOK à la fin de la commande curl
          curl -X POST -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"🚀 Nouveau Push sur $BRANCH\",
              \"description\": \"💡 **Message :**\n> $MSG\n\n $JIRA_LINK\",
              \"color\": $COLOR,
              \"fields\": [
                { \"name\": \"🌿 Repo\", \"value\": \"\`$REPO\`\", \"inline\": true },
                { \"name\": \"👤 Auteur\", \"value\": \"**$AUTHOR**\", \"inline\": true }
              ],
              \"footer\": { \"text\": \"Ludora App Frontend\" },
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" $SELECTED_WEBHOOK
