name: CI/CD Pipeline

# Annule le run précédent si un nouveau commit est pushé sur la même branche.
# Économie critique de quota dans une org multi-repo.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - dev
      - staging
  pull_request:
    branches:
      - main
      - dev
      - staging

jobs:
  # ============================================
  # JOB 1: FORMAT & LINT — désactivé
  # Géré par Husky pre-commit, inutile de re-payer le quota CI.
  # Ré-activer si besoin de vérification côté PR (ex: contributeurs externes).
