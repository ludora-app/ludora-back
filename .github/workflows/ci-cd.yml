  # ============================================
  # JOB 3: Swagger — génération de swagger.json en artifact
  # Déclenché uniquement sur les PR vers main, dev ou staging.
  # SWAGGER_ONLY=true empêche Prisma et Firebase de tenter une vraie connexion.
  # JWT_SECRET est requis par JwtModule.registerAsync() au démarrage.
  # ============================================
  swagger:
    name: SWAGGER
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    container:
      image: node:22.13.1-slim

    env:
      SWAGGER_ONLY: 'true'
      NODE_ENV: development
      # Auth
      JWT_SECRET: swagger-ci-dummy-secret
      # Prisma (Pool créé dans le constructor, $connect() skippé par SWAGGER_ONLY)
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      # PaymentService constructor: new Stripe(getOrThrow('STRIPE_SECRET_KEY'))
      STRIPE_SECRET_KEY: sk_test_swagger_dummy
      # EmailsService class property + createTransporter() dans le constructor
      LUDORA_ADMIN_EMAIL: swagger@dummy.local
      EMAIL_HOST: smtp.dummy.local
      EMAIL_PORT: '587'
      EMAIL_USER: swagger@dummy.local
      EMAIL_PASSWORD: dummy
      # StorageService class property: getOrThrow('CLOUDFLARE_R2_PUBLIC_URL')
      CLOUDFLARE_R2_PUBLIC_URL: https://dummy.r2.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Generate swagger.json
        run: pnpm swagger:generate

      - name: Upload swagger.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: swagger-${{ github.base_ref || github.ref_name }}
          path: swagger.json
          retention-days: 7

  # ============================================
  # JOB 4: Build
  # ============================================
  build:
    name: BUILD
    runs-on: ubuntu-latest
    # FIXME résolu: "needs: test" était ici, mais test n'existe que sur PR.
    # Sur un push, test était skippé → build skippé → release skippée.
    # Le pipeline entier ne faisait rien sur push. Suppression du needs.
    container:
      image: node:22.13.1-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # pnpm/action-setup AVANT setup-node pour activer le cache intégré.
      # Plus fiable que corepack dans les containers slim (pas de vérification de signature).
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: chmod +x scripts/build.sh && ./scripts/build.sh

      - name: Clean build artifacts
        run: |
          find dist/ -name "*.map" -delete || true
          find dist/ -name "*.test.*" -delete || true
          find dist/ -name "*.spec.*" -delete || true
          rm -rf dist/node_modules dist/.git dist/coverage

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            package.json
            prisma/
            docker/
            compose.*.yml
          retention-days: 3

# ============================================
  # JOB 4: Versioning & Changelog
  # ============================================
  release:
    name: SEMANTIC RELEASE
    runs-on: ubuntu-latest
    needs: build
    # On ne release que sur push vers main (la résolution d'une PR = un push)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
    permissions:
      contents: write # Important pour pousser les tags/changelog
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Requis pour l'analyse des commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # S'assure que les tags du remote sont bien visibles localement,
      # même après un checkout partiel ou une annulation de run précédente.
      - name: Fetch all tags
        run: git fetch --tags --force

      # Vérifie s'il existe des commits releasables (feat/fix/BREAKING CHANGE)
      # depuis le dernier tag. Si non, on court-circuite semantic-release
      # pour éviter l'erreur "tag already exists".
      - name: Check for releasable commits
        id: check
        run: |
          # Guard 1 : si HEAD est déjà taggué, un run précédent a terminé le
          # tagging. On évite ainsi la re-création du même tag (exit 128).
          HEAD_TAG=$(git tag --points-at HEAD | grep -E "^v[0-9]" | head -1 || true)
          if [ -n "$HEAD_TAG" ]; then
            echo "HEAD already tagged as ${HEAD_TAG}, skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag, proceeding with release."
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Last tag: $LAST_TAG"
          RELEASABLE=$(git log "${LAST_TAG}..HEAD" --oneline \
            | grep -E "^[a-f0-9]+ (feat|fix)(\(.+\))?!?:" \
            || true)
          BREAKING=$(git log "${LAST_TAG}..HEAD" --format="%B" \
            | grep -E "^BREAKING CHANGE:" \
            || true)
          if [ -n "$RELEASABLE" ] || [ -n "$BREAKING" ]; then
            echo "Releasable commits found."
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "No releasable commits since $LAST_TAG, skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Install pnpm
        if: steps.check.outputs.should_release == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        if: steps.check.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: pnpm

      - name: Install dependencies
        if: steps.check.outputs.should_release == 'true'
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        if: steps.check.outputs.should_release == 'true'
        run: pnpm prisma generate

      - name: Release
        if: steps.check.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          npx semantic-release > release.log 2>&1
          EXIT=$?
          set -e
          cat release.log
          if [ $EXIT -ne 0 ]; then
            # Tag already exists (git 128), or same version already released — treat as success
            if grep -qEi "already exists|exitCode: 128|exit code 128|Command failed with exit code 128|fatal: tag|ExecaError" release.log; then
              echo "::notice:: Release failed with known benign error (e.g. tag already exists), treating as success."
              exit 0
            fi
          fi
          exit $EXIT
